version: '3.9'

services:
  # ─── Base de Datos PostgreSQL ────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: scam_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-scam_detection_db}
      POSTGRES_USER: ${POSTGRES_USER:-scam_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/app/db/migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-scam_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend FastAPI ──────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: scam_api
    restart: unless-stopped
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-scam_detection_db}
      POSTGRES_USER: ${POSTGRES_USER:-scam_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      API_SECRET_KEY: ${API_SECRET_KEY:-dev_secret_key}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    volumes:
      - ./backend:/app
      - model_cache:/app/ml_models
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
  model_cache:
