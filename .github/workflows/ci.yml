name: CI

# Pipeline de Integración Continua — evidencia para el Plan SQA (IEEE 730).
#   - backend-tests   → pruebas unitarias/integración + cobertura (pytest-cov)
#   - mobile-tests    → análisis estático Dart + pruebas Flutter + cobertura
#   - static-analysis → análisis estático Python (ruff) [informativo]
#
# Mapea a los puntos de la rúbrica:
#   3.6.2/3.6.3 Revisión de código y pruebas unitarias · 3.9 Herramientas CI ·
#   4.2.2 Cobertura de pruebas · 4.3.2 Lead Time QA.

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch: {}

# Cancela ejecuciones previas del mismo branch/PR para ahorrar minutos.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────
  # Backend FastAPI: pruebas unitarias + integración + cobertura
  # ─────────────────────────────────────────────────────────────
  backend-tests:
    name: Backend · pytest + cobertura
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Instalar dependencias de test (ligeras, sin TensorFlow)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Ejecutar pruebas con cobertura
        # Compuerta de calidad: falla el CI si la cobertura cae por debajo del
        # 85% (meta del Plan SQA). Línea base actual medida: 91.5%.
        run: |
          pytest \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-report=html \
            --cov-fail-under=85 \
            --junitxml=pytest-report.xml

      - name: Resumen de cobertura en el job
        if: always()
        run: |
          echo "### Cobertura backend" >> "$GITHUB_STEP_SUMMARY"
          coverage report >> "$GITHUB_STEP_SUMMARY" || true

      - name: Calidad del detector de estafas (F1 / matriz de confusión)
        if: always()
        run: |
          echo '### Calidad del modelo (detector de estafas)' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          python -m tests.quality.detector_eval >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Subir reportes (evidencia QA)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: |
            backend/htmlcov/
            backend/coverage.xml
            backend/pytest-report.xml
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────
  # Mobile Flutter: análisis estático + pruebas + cobertura
  # ─────────────────────────────────────────────────────────────
  mobile-tests:
    name: Mobile · flutter analyze + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Flutter
        # Canal stable (el código usa Color.withValues, API de Flutter >= 3.27).
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Resolver dependencias
        run: flutter pub get

      - name: Análisis estático (flutter analyze)
        run: flutter analyze

      - name: Verificar formato
        run: dart format --output=none --set-exit-if-changed lib test
        continue-on-error: true

      - name: Ejecutar pruebas con cobertura
        run: flutter test --coverage

      - name: Subir cobertura (evidencia QA)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-coverage
          path: mobile/coverage/lcov.info
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────
  # Análisis estático Python (ruff) — informativo mientras se limpia.
  # Cuando el código quede sin hallazgos, quita `continue-on-error`
  # para convertirlo en una compuerta de calidad obligatoria.
  # ─────────────────────────────────────────────────────────────
  static-analysis:
    name: Static analysis · ruff
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Instalar ruff
        run: pip install ruff

      - name: Lint (ruff)
        run: ruff check app tests --output-format=github
        continue-on-error: true

  # ─────────────────────────────────────────────────────────────
  # Seguridad: análisis estático (Bandit) + auditoría de dependencias
  # (pip-audit). Mapea a la rúbrica 3.6.7 / 5.2.7 (Seguridad).
  # ─────────────────────────────────────────────────────────────
  security-scan:
    name: Security · bandit + pip-audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Instalar herramientas de seguridad
        run: pip install bandit pip-audit

      - name: Análisis estático de seguridad (Bandit)
        run: bandit -r app -ll -f txt
        continue-on-error: true

      - name: Auditoría de vulnerabilidades en dependencias (pip-audit)
        run: pip-audit -r requirements-local.txt --desc
        continue-on-error: true
